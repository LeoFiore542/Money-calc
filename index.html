<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcolatore Ore e Turni</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Money Calc</h1>
        <button id="settingsToggleBtn" class="icon-btn" type="button" aria-label="Apri impostazioni">
          &#9881;
        </button>
      </header>

      <section id="inputSection" class="input-section">
        <p class="hint">Quanto vuoi guadagnare?</p>
        <div class="amount-wrap">
          <span class="euro-symbol">€</span>
          <input id="targetAmount" class="amount-input" type="number" min="0" step="0.01" placeholder="0,00" />
        </div>
        <button id="calculateBtn" class="primary-btn" type="button">Calcola</button>
      </section>

      <section id="animationSection" class="animation-section hidden" aria-live="polite">
        <p class="hint">Ore di lavoro necessarie</p>
        <div id="hoursValue" class="hours-value">0.00</div>
        <div id="shiftsResult" class="shifts-result">
          <p class="hint">Turni necessari (arrotondati per eccesso)</p>
          <p id="shiftsValue" class="shifts-value">0</p>
        </div>
        <button id="resetBtn" class="ghost-btn" type="button">Nuovo calcolo</button>
      </section>
    </main>

    <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="settingsTitle">Impostazioni</h2>
          <button id="closeSettingsBtn" class="icon-btn close-btn" type="button" aria-label="Chiudi impostazioni">
            &times;
          </button>
        </div>

        <label for="hourlyRate">Salario orario (€)</label>
        <input id="hourlyRate" type="number" min="0" step="0.01" placeholder="Es. 12.50" />

        <label for="shiftHours">Durata turno (ore)</label>
        <input id="shiftHours" type="number" min="0" step="0.1" placeholder="Es. 8" />

        <button id="saveSettingsBtn" class="primary-btn" type="button">Salva impostazioni</button>
        <p id="settingsStatus" class="small"></p>
      </div>
    </div>

    <div id="versionIndicator" class="version-indicator" aria-label="Versione applicazione"></div>

    <script src="script.js"></script>
  </body>
</html>
